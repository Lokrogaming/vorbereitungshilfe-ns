<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorbereitungshilfe – Geschichte Klasse 9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}

/* HEADER */
.hdr{background:#1C1C1A;color:#fff;padding:14px 18px 10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hdr h1{font-size:16px;margin-bottom:2px}
.hdr p{font-size:11px;color:#999}
.pb-wrap{margin-top:8px;background:#333;border-radius:6px;height:7px;overflow:hidden}
.pb{height:7px;background:linear-gradient(90deg,#1A5E36,#27ae60);border-radius:6px;transition:width .5s}
.pb-lbl{font-size:10px;color:#888;margin-top:3px;text-align:right}

/* NAV */
.nav{display:flex;gap:5px;padding:9px 12px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:nowrap}
.nb{padding:5px 12px;border:1.5px solid #ddd;border-radius:16px;background:#fff;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.nb.active{background:#1C1C1A;color:#fff;border-color:#1C1C1A}
.nb.done{border-color:#1A5E36;color:#1A5E36}
.nb.warn{border-color:#e67e22;color:#e67e22}

/* MAIN */
.main{padding:12px;max-width:860px;margin:0 auto}

/* CARDS */
.card{background:#fff;border-radius:10px;border:1.5px solid #e8e8e8;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.card-hdr h2{font-size:14px;font-weight:600}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.badge.s{background:#e8f5e9;color:#1A5E36}
.badge.u{background:#fff3e0;color:#e65100}
.badge.o{background:#f3f3f3;color:#777}

/* SELF ASSESS */
.sa{padding:10px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sa p{font-size:12px;color:#555;flex-shrink:0}
.sa-btn{padding:5px 12px;border-radius:14px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .12s}
.sa-btn.ss{background:#1A5E36;color:#fff;border-color:#1A5E36}
.sa-btn.su{background:#e65100;color:#fff;border-color:#e65100}

/* EXERCISES */
.exwrap{padding:12px 16px}
.ex-lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

.ex{border-radius:7px;padding:12px;margin-bottom:10px;border-left:3px solid #ccc;background:#f8f9fa}
.ex.a1{border-left-color:#3498db;background:#f0f7ff}
.ex.a2{border-left-color:#8e44ad;background:#f8f0ff}
.ex.a3{border-left-color:#e67e22;background:#fff8f0}
.ex.gap{border-left-color:#16a085;background:#f0faf8}
.ex.drag{border-left-color:#c0392b;background:#fff8f8}
.afb-tag{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.a1 .afb-tag{color:#2471a3}
.a2 .afb-tag{color:#7d3c98}
.a3 .afb-tag{color:#d35400}
.gap .afb-tag{color:#16a085}
.drag .afb-tag{color:#c0392b}
.qtext{font-size:13px;font-weight:500;margin-bottom:9px;line-height:1.5}
.srcbox{background:#fff;border:1px solid #ddd;border-radius:5px;padding:8px 10px;margin-bottom:8px;font-size:12px;font-style:italic;color:#555;line-height:1.6}

/* MC */
.mc-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.mco{display:flex;align-items:flex-start;gap:7px;background:#fff;border:1.5px solid #ddd;border-radius:5px;padding:7px 10px;cursor:pointer;font-size:13px;transition:all .12s;line-height:1.4}
.mco:hover:not(.lk){border-color:#1A5E36}
.mco.ok{border-color:#1A5E36;background:#e8f5e9;pointer-events:none}
.mco.no{border-color:#c0392b;background:#fde8e8;pointer-events:none}
.mco.lk{pointer-events:none}
.mco .ci{width:16px;height:16px;border-radius:50%;border:1.5px solid #ccc;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mco.ok .ci{background:#1A5E36;border-color:#1A5E36;color:#fff}
.mco.no .ci{background:#c0392b;border-color:#c0392b;color:#fff}

/* OPEN */
.ta{width:100%;min-height:70px;border:1.5px solid #ddd;border-radius:5px;padding:7px 9px;font-family:Arial;font-size:13px;resize:vertical;line-height:1.5}
.ta:focus{outline:none;border-color:#1A5E36}
.show-btn{margin-top:7px;background:#1C1C1A;color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.show-btn:hover{background:#333}
.show-btn.shown{background:#555}

/* MUSTERLÖSUNG + SELBSTBEWERTUNG */
.muster{background:#e8f5e9;border-left:3px solid #1A5E36;border-radius:0 6px 6px 0;padding:10px 12px;margin-top:7px;font-size:13px;color:#1a3a1a;line-height:1.6;display:none}
.muster.vis{display:block}
.muster strong{color:#0F3D22}
.selfcheck{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,120,60,.2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.selfcheck p{font-size:12px;color:#2d6a4f}
.sc-btn{padding:4px 12px;border-radius:12px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .12s}
.sc-btn.yes{background:#1A5E36;color:#fff;border-color:#1A5E36}
.sc-btn.no{background:#e65100;color:#fff;border-color:#e65100}

/* GAP TEXT */
.gap-text{font-size:14px;line-height:2.2;background:#fff;border-radius:6px;padding:12px;margin-bottom:8px;border:1px solid #ddd}
.gap-input{border:none;border-bottom:2px solid #16a085;background:transparent;font-size:14px;font-family:Arial;width:160px;color:#0d6b5a;outline:none;padding:0 2px;transition:border-color .15s}
.gap-input:focus{border-bottom-color:#0d6b5a}
.gap-input.gg{border-bottom-color:#1A5E36;color:#1A5E36}
.gap-input.gw{border-bottom-color:#c0392b;color:#c0392b}
.check-gap-btn{background:#16a085;color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;margin-top:6px}
.check-gap-btn:hover{background:#0d6b5a}
.gap-feedback{font-size:12px;margin-top:6px;padding:6px 10px;border-radius:5px;display:none}
.gap-feedback.vis{display:block}
.gap-feedback.gfok{background:#e8f5e9;color:#1a3a1a}
.gap-feedback.gfno{background:#fde8e8;color:#4a1010}

/* DRAG-DROP TIMELINE */
.tl-wrap{margin-bottom:8px}
.tl-pool{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#fff;border:2px dashed #c0392b;border-radius:7px;min-height:44px;margin-bottom:10px}
.tl-chip{background:#c0392b;color:#fff;border-radius:5px;padding:5px 10px;font-size:12px;cursor:grab;user-select:none;touch-action:none;line-height:1.3}
.tl-chip.placed{opacity:.35;pointer-events:none}
.tl-slots{display:flex;flex-direction:column;gap:6px}
.tl-slot{display:flex;align-items:stretch;border:1.5px dashed #ddd;border-radius:7px;min-height:44px;overflow:hidden;transition:border-color .15s}
.tl-slot.dov{border-color:#c0392b;background:#fff8f8}
.tl-slot.cor{border-color:#1A5E36;background:#e8f5e9}
.tl-slot.wro{border-color:#c0392b;background:#fde8e8}
.slot-nr{width:28px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#888;flex-shrink:0}
.slot-drop{flex:1;padding:6px 10px;display:flex;align-items:center;font-size:12px;color:#aaa;font-style:italic}
.slot-drop.has{color:#1a1a1a;font-style:normal;cursor:grab}
.slot-hint{font-size:10px;color:#888;padding:4px 10px;flex-shrink:0;display:flex;align-items:center}
.tl-check-btn{background:#c0392b;color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;margin-top:4px}
.tl-result{font-size:12px;margin-top:6px;padding:7px 10px;border-radius:5px;display:none}
.tl-result.vis{display:block;background:#e8f5e9;color:#1a3a1a}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.match-col-lbl{font-size:10px;font-weight:700;color:#888;margin-bottom:4px;text-transform:uppercase}
.mi{padding:7px 9px;border-radius:5px;font-size:12px;cursor:pointer;border:1.5px solid #ddd;background:#fff;transition:all .12s;text-align:center;line-height:1.4}
.mi:hover:not(.md):not(.mw){border-color:#8e44ad;background:#f8f0ff}
.mi.ms{border-color:#8e44ad;background:#f3e5f5}
.mi.md{border-color:#1A5E36;background:#c8e6c9;cursor:default;font-weight:600}
.mi.mw{border-color:#c0392b;background:#fde8e8}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.ov-card{background:#fff;border-radius:8px;padding:12px;border:1.5px solid #e8e8e8;text-align:center}
.ov-icon{font-size:22px;margin-bottom:3px}
.ov-lbl{font-size:10px;color:#888;margin-bottom:1px}
.ov-val{font-size:20px;font-weight:700}
.ov-val.g{color:#1A5E36}
.ov-val.o{color:#e65100}

.hint-box{background:#fff8e1;border-left:4px solid #f39c12;border-radius:0 7px 7px 0;padding:9px 12px;font-size:12px;color:#5d4037;margin:8px 0}

/* EVAL */
.eval-hdr{text-align:center;padding:18px;border-radius:10px;margin-bottom:14px}
.eval-hdr.gr{background:#e8f5e9}
.eval-hdr.go{background:#fff8e1}
.eval-hdr.gw{background:#fde8e8}
.eval-score{font-size:38px;font-weight:700;margin-bottom:4px}
.eval-msg{font-size:15px;font-weight:600}
.eval-sub{font-size:12px;color:#666;margin-top:3px}
.tr-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.tr{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#fff;border-radius:7px;border:1px solid #e8e8e8}
.tr-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.tr-info{flex:1}
.tr-ttl{font-size:13px;font-weight:600}
.tr-sub{font-size:11px;color:#888;margin-top:2px}
.tr-bdg{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0}
.tr-bdg.g{background:#e8f5e9;color:#1A5E36}
.tr-bdg.o{background:#fff3e0;color:#e65100}
.tr-bdg.r{background:#fde8e8;color:#c0392b}
.reco-box{background:#e3f2fd;border-left:4px solid #1565c0;border-radius:0 8px 8px 0;padding:11px 14px;margin-top:12px;font-size:13px;color:#0d3060;line-height:1.7}
.reco-box strong{display:block;margin-bottom:5px;font-size:14px}
.restart-btn{display:block;width:100%;margin-top:12px;padding:11px;background:#1C1C1A;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer}
.eval-btn{background:#1A5E36;color:#fff;border:none;border-radius:7px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;display:block;width:100%}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;cursor:pointer;margin-bottom:10px;background:none;border:none;padding:0}

/* TOUCH GHOST */
.tghost{position:fixed;pointer-events:none;z-index:1000;opacity:.85;transform:rotate(3deg);background:#c0392b;color:#fff;border-radius:5px;padding:5px 10px;font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <h1>Vorbereitungshilfe – Geschichte Klasse 9</h1>
  <p>Nationalsozialismus – Aus einer Demokratie wird eine Diktatur</p>
  <div class="pb-wrap"><div class="pb" id="pb" style="width:0%"></div></div>
  <div class="pb-lbl" id="pbl">0 von 7 Lernzielen bearbeitet</div>
</div>

<div class="nav" id="nav">
  <button class="nb active" onclick="go('ov')">📋 Übersicht</button>
  <button class="nb" id="n0" onclick="go(0)">Begriffe</button>
  <button class="nb" id="n1" onclick="go(1)">Quelle</button>
  <button class="nb" id="n2" onclick="go(2)">Stationen</button>
  <button class="nb" id="n3" onclick="go(3)">Ideologie</button>
  <button class="nb" id="n4" onclick="go(4)">Reichstagsbrand</button>
  <button class="nb" id="n5" onclick="go(5)">Wirtschaft</button>
  <button class="nb" id="n6" onclick="go(6)">Unterstützung</button>
</div>

<div class="main" id="mc"></div>

<script>
// ─── STATE ────────────────────────────────────
const ST={};   // sectionId → 'sicher'|'unsicher'
const SC={};   // sectionId → {self:'yes'|'no'|null}[] per exercise
let cur='ov';

// ─── MC POOLS ─────────────────────────────────
const MCP={
  begriffe:[
    {q:"Was versteht man unter 'Gleichschaltung'?",opts:[
      {t:"Einführung gleicher Löhne",c:false},
      {t:"Unterordnung aller gesellschaftlichen Bereiche unter die NSDAP",c:true},
      {t:"Gleichstellung von Frauen",c:false},
      {t:"Vereinheitlichung des Schulsystems",c:false}]},
    {q:"Was besagt das Führerprinzip?",opts:[
      {t:"Alle entscheiden demokratisch per Mehrheit",c:false},
      {t:"Der Führer hat uneingeschränkte Macht und erhält bedingungslosen Gehorsam",c:true},
      {t:"Jeder kann durch Wahl Führer werden",c:false},
      {t:"Der Führer muss dem Parlament Rechenschaft ablegen",c:false}]},
    {q:"Was verstand Hitler unter 'Lebensraum'?",opts:[
      {t:"Mehr Wohnraum in deutschen Städten",c:false},
      {t:"Neue Gebiete in Westeuropa",c:false},
      {t:"Neues Land für das deutsche Volk – vor allem in Osteuropa",c:true},
      {t:"Naturschutzgebiete im Deutschen Reich",c:false}]},
  ],
  ideologie:[
    {q:"Welche Aussage entspricht NICHT der NS-Ideologie?",opts:[
      {t:"Die Deutschen sind eine überlegene Rasse",c:false},
      {t:"Deutschland braucht Lebensraum im Osten",c:false},
      {t:"Alle Menschen sind gleichwertig",c:true},
      {t:"Der Führer hat uneingeschränkte Macht",c:false}]},
    {q:"Welche vier Grundelemente hatte die NS-Ideologie?",opts:[
      {t:"Demokratie, Pressefreiheit, Sozialismus, Pazifismus",c:false},
      {t:"Rassismus, Lebensraum, Führerprinzip, Gewalt/Antibolschewismus",c:true},
      {t:"Kapitalismus, Nationalismus, Frieden, Gleichheit",c:false},
      {t:"Religion, Tradition, Familie, Arbeit",c:false}]},
    {q:"Was bezeichneten die Nationalsozialisten mit 'Arier'?",opts:[
      {t:"Alle Einwohner Deutschlands",c:false},
      {t:"Eine angeblich überlegene nordische Rasse – eine rassistische Erfindung",c:true},
      {t:"Nur NSDAP-Mitglieder",c:false},
      {t:"Alle Europäer",c:false}]},
  ],
  wirtschaft:[
    {q:"Was waren die Mefo-Wechsel?",opts:[
      {t:"Goldmünzen aus der NS-Zeit",c:false},
      {t:"Geheime Schuldversprechen zur Bezahlung von Rüstungsunternehmen",c:true},
      {t:"Sonderkredite für Arbeitslose",c:false},
      {t:"Wechselkurse zwischen Reichsmark und Dollar",c:false}]},
    {q:"Wie viele Millionen waren 1932 arbeitslos?",opts:[
      {t:"ca. 1 Million",c:false},
      {t:"ca. 3 Millionen",c:false},
      {t:"ca. 6 Millionen",c:true},
      {t:"ca. 10 Millionen",c:false}]},
    {q:"Wofür wurden die meisten Staatsausgaben nach 1933 verwendet?",opts:[
      {t:"Schulen und Universitäten",c:false},
      {t:"Rüstung und Militär",c:true},
      {t:"Sozialleistungen und Renten",c:false},
      {t:"Landwirtschaft",c:false}]},
  ],
  diktatur:[
    {q:"Wann wurde Hitler zum Reichskanzler ernannt?",opts:[
      {t:"30. Januar 1933",c:true},
      {t:"28. Februar 1933",c:false},
      {t:"23. März 1933",c:false},
      {t:"2. August 1934",c:false}]},
    {q:"Was ermöglichte das Ermächtigungsgesetz?",opts:[
      {t:"Hitler konnte Deutschland verlassen",c:false},
      {t:"Hitler konnte ohne Reichstag Gesetze erlassen",c:true},
      {t:"Alle Deutschen mussten in die NSDAP eintreten",c:false},
      {t:"Der Reichspräsident wurde abgeschafft",c:false}]},
    {q:"Was geschah am 2. August 1934?",opts:[
      {t:"Der Reichstag brannte",c:false},
      {t:"Das Ermächtigungsgesetz trat in Kraft",c:false},
      {t:"Hitler vereinte Reichskanzler und Reichspräsident – wurde 'Führer'",c:true},
      {t:"Die NSDAP wurde gegründet",c:false}]},
  ],
};

function pickMC(pool){ return [...pool].sort(()=>Math.random()-.5)[0]; }
function shOpts(opts){ return [...opts].sort(()=>Math.random()-.5); }

// ─── SECTIONS ─────────────────────────────────
const SECS=[
  { id:0, title:"Begriffe erklären",
    desc:"Gleichschaltung · Antisemitismus · Führerprinzip · Lebensraum",
    ref:"AB Baustein 3 | SB S. 136–138",
    recoPage:"S. 136–138",
    exercises:[
      { type:"mc", pool:"begriffe", afb:1, pts:3 },
      { type:"gap", afb:1, pts:5,
        label:"Lückentext – Begriffe",
        template:"Die NS-Ideologie basierte auf mehreren Grundelementen. Der __1__ beschreibt den Hass auf Juden und anderen Völker, die als minderwertig betrachtet wurden. Das __2__ bedeutete, dass Hitler uneingeschränkte Macht besaß und bedingungsloser Gehorsam erwartet wurde. Unter __3__ verstanden die Nationalsozialisten die Forderung nach neuem Land in __4__. Die Unterordnung aller gesellschaftlichen Bereiche unter die NSDAP nennt man __5__.",
        blanks:["Antisemitismus","Führerprinzip","Lebensraum","Osteuropa","Gleichschaltung"],
        slots:["1","2","3","4","5"] },
      { type:"open", afb:2, pts:4,
        q:"Erkläre in 2–3 Sätzen: Was verstand Hitler unter dem Begriff 'Lebensraum'?",
        model:"Hitler verstand unter 'Lebensraum' die Forderung nach neuem Land für das deutsche Volk – vor allem in Osteuropa (Russland, Ukraine). Er behauptete, Deutschland brauche mehr Platz für seine Bevölkerung. Die gewaltsame Eroberung wurde mit der angeblichen Überlegenheit der deutschen Rasse gerechtfertigt." },
    ]
  },
  { id:1, title:"Schriftliche Quelle analysieren",
    desc:"Quellenvorstellung · Inhalt erschließen · Standpunkt erkennen",
    ref:"AB Baustein 1–3",
    recoPage:"Arbeitsblätter Baustein 1–3",
    exercises:[
      { type:"open", afb:1, pts:4,
        source:'"In erschreckenden Massen wird die Währung von der schrankenlos betriebenen Ausgabewirtschaft bedroht [...] Keine Notenbank ist imstande, die Ausgabenwirtschaft eines Staates aufrechtzuerhalten gegen eine inflationistische Ausgabepolitik des Staates." — Hjalmar Schacht, Brief, 7. Januar 1939',
        q:"Stelle diese Quelle strukturiert vor: Wer? Was für eine Quelle? Wann? An wen?",
        model:"Verfasser: Hjalmar Schacht, Präsident der Deutschen Reichsbank. Quellenart: Interner Brief (Primärquelle). Entstehungszeit: 7. Januar 1939. Adressat: Die Direktoren der Deutschen Reichsbank." },
      { type:"open", afb:2, pts:5,
        source:"(Quelle: Schacht-Brief – siehe oben)",
        q:"Erkläre in eigenen Worten, was Schacht in diesem Brief kritisiert. Was befürchtet er?",
        model:"Schacht kritisiert die maßlosen Staatsausgaben der NS-Regierung. Er befürchtet, dass diese uferlosen Ausgaben (vor allem für Rüstung) die Währung zerstören und den Staat in den Bankrott treiben. Keine Notenbank könne eine solche Ausgabenpolitik auf Dauer tragen." },
      { type:"gap", afb:1, pts:4,
        label:"Lückentext – Quellenanalyse",
        template:"Eine Quelle analysieren bedeutet: zuerst die __1__ vorstellen (Wer hat sie verfasst? Wann? Welche Art von Quelle?). Dann den __2__ der Quelle zusammenfassen (Worum geht es?). Schließlich den __3__ des Autors herausarbeiten (Was will er sagen? Was kritisiert er?).",
        blanks:["Quelle","Inhalt","Standpunkt"],
        slots:["1","2","3"] },
    ]
  },
  { id:2, title:"Stationen auf dem Weg zur Diktatur",
    desc:"Chronik · Ermächtigungsgesetz · Stufenmodell",
    ref:"Tafelbild Stufenmodell | stephmeu.github.io/Machtergreifung",
    recoPage:"Stufenmodell-Tafelbild + Artefakt",
    exercises:[
      { type:"mc", pool:"diktatur", afb:1, pts:3 },
      { type:"timeline", afb:1, pts:6,
        label:"Zeitstrahl – Ziehe die Ereignisse in die richtige Reihenfolge",
        items:[
          {id:"a",t:"Hitler wird Reichskanzler",date:"30. Jan. 1933",order:1},
          {id:"b",t:"Reichstagsbrand",date:"27./28. Feb. 1933",order:2},
          {id:"c",t:"Reichstagsbrandverordnung",date:"28. Feb. 1933",order:3},

// ─── MC CHECK ─────────────────────────────────
function chkMC(rid,oi,correct){
  document.querySelectorAll(`[id^="mco-${rid}-"]`).forEach(el=>el.classList.add('lk'));
  const el=document.getElementById(`mco-${rid}-${oi}`);
  const ci=document.getElementById(`ci-${rid}-${oi}`);
  el.classList.add(correct?'ok':'no');
  ci.textContent=correct?'✓':'✗';
  if(!correct){
    // highlight correct
    document.querySelectorAll(`[id^="mco-${rid}-"]`).forEach((e,i)=>{
      // can't know which is correct without storing opts, skip
    });
  }
}

// ─── GAP CHECK ────────────────────────────────
function chkGap(rid,n){
  let ok=0;
  for(let i=0;i<n;i++){
    const inp=document.getElementById(`gi-${rid}-${i}`);
    if(!inp) continue;
    const ans=inp.value.trim().toLowerCase();
    const exp=inp.dataset.ans.toLowerCase();
    if(ans===exp||exp.includes(ans)&&ans.length>3){inp.classList.add('gg');ok++;}
    else{inp.classList.add('gw');}
    inp.readOnly=true;
  }
  const fb=document.getElementById(`gf-${rid}`);
  fb.className=`gap-feedback vis ${ok===n?'gfok':'gfno'}`;
  fb.textContent=ok===n?`✅ Alle ${n} Lücken richtig!`:`${ok} von ${n} richtig. Schau dir die roten Felder an.`;
}

function selfCheck(rid,val){

// ─── MATCH ────────────────────────────────────
function selTerm(rid,ti,term){
  const st=matchSt[rid]; if(!st) return;
  if(st.done.includes('T'+ti)) return;
  document.querySelectorAll(`[id^="mt-${rid}-"]`).forEach(e=>{if(!e.classList.contains('md')) e.classList.remove('ms');});
  st.selTerm={idx:ti,val:term};
  document.getElementById(`mt-${rid}-${ti}`).classList.add('ms');
  tryMatch(rid);
}
function selDef(rid,di,def){
  const st=matchSt[rid]; if(!st) return;
  if(st.done.includes('D'+di)) return;
  document.querySelectorAll(`[id^="md-${rid}-"]`).forEach(e=>{if(!e.classList.contains('md')) e.classList.remove('ms');});
  st.selDef={idx:di,val:def};
  document.getElementById(`md-${rid}-${di}`).classList.add('ms');
  tryMatch(rid);
}
function tryMatch(rid){
  const st=matchSt[rid];
  if(!st.selTerm||!st.selDef) return;
  const correct=st.pairs.find(p=>p[0]===st.selTerm.val&&p[1]===st.selDef.val);
  const te=document.getElementById(`mt-${rid}-${st.selTerm.idx}`);
  const de=document.getElementById(`md-${rid}-${st.selDef.idx}`);
  if(correct){
    te.classList.replace('ms','md'); de.classList.replace('ms','md');
    st.done.push('T'+st.selTerm.idx,'D'+st.selDef.idx);
  } else {
    te.classList.add('mw'); de.classList.add('mw');
    setTimeout(()=>{
      te.classList.remove('mw','ms'); de.classList.remove('mw','ms');
    },700);
  }
  st.selTerm=null; st.selDef=null;
}

// ─── TIMELINE DRAG (mouse) ─────────────────────
function ev(e){e.preventDefault();}
function dragStart(e,rid,itemId){
  dragItem=itemId; dragFrom=rid;
  e.dataTransfer.effectAllowed='move';
}
function dropSlot(e,rid,si){
  e.preventDefault();
  if(!dragItem) return;
  const slot=document.getElementById(`slotd-${rid}-${si}`);
  const prev=slot.dataset.itemId;
  if(prev) document.getElementById(`chip-${rid}-${prev}`)?.classList.remove('placed');
  slot.dataset.itemId=dragItem;
  slot.textContent=dragItem?document.getElementById(`chip-${rid}-${dragItem}`)?.textContent:'';
  slot.classList.add('has');
  document.getElementById(`chip-${rid}-${dragItem}`)?.classList.add('placed');
  dragItem=null;
}
function dropPool(e,rid){
  e.preventDefault();
  if(!dragItem) return;
  document.getElementById(`chip-${rid}-${dragItem}`)?.classList.remove('placed');
  // Remove from any slot
  document.querySelectorAll(`[id^="slotd-${rid}-"]`).forEach(sl=>{
    if(sl.dataset.itemId===dragItem){sl.dataset.itemId='';sl.textContent='Hierher ziehen…';sl.classList.remove('has');}
  });
  dragItem=null;
}

// ─── TIMELINE TOUCH ───────────────────────────
function tStart(e,rid,itemId){
  dragItem=itemId; dragFrom=rid;
  tghost=document.createElement('div');
  tghost.className='tghost';
  tghost.textContent=e.currentTarget.textContent.trim();
  document.body.appendChild(tghost);
  mvGhost(e.touches[0]);
}
function tMove(e){ e.preventDefault(); if(tghost) mvGhost(e.touches[0]); }
function tEnd(e,rid,si){
  if(tghost){tghost.remove();tghost=null;}
  if(dragItem===null) return;
  if(si!==undefined){dropSlot(e,rid,si);}
  else {
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const slot=el?.closest('[id^="slotd-"]');
    if(slot){
      const parts=slot.id.split('-');
      dropSlot(e,rid,parseInt(parts[parts.length-1]));
    } else dropPool(e,rid);
  }
  dragItem=null;
}
function mvGhost(t){ if(!tghost) return; tghost.style.left=(t.clientX-60)+'px'; tghost.style.top=(t.clientY-20+window.scrollY)+'px'; }

// ─── TIMELINE CHECK ───────────────────────────
function chkTL(rid,itemsStr){
  const items=JSON.parse(itemsStr.replace(/&quot;/g,'"'));
  let ok=0;
  items.forEach((it,si)=>{
    const slot=document.getElementById(`slotd-${rid}-${si}`);
    const slotEl=document.getElementById(`tls-${rid}-${si}`);
    const placed=slot?.dataset.itemId;
    const correctItem=items.find(x=>x.order===si+1);
    if(placed===correctItem?.id){ok++;slotEl?.classList.add('cor');}
    else slotEl?.classList.add('wro');
  });
  const res=document.getElementById(`tlr-${rid}`);
  res.className='tl-result vis';
  if(ok===items.length){
    res.innerHTML=`✅ Alle ${ok} Ereignisse richtig! Richtige Reihenfolge: ${items.map(x=>x.date+': '+x.t).join(' → ')}`;
  } else {
    res.innerHTML=`${ok} von ${items.length} richtig. Grün = richtig, Rot = falsch.<br><strong>Richtige Reihenfolge:</strong><br>${items.map(x=>`${x.order}. ${x.date}: ${x.t}`).join('<br>')}`;
  }
}

// ─── STATUS ───────────────────────────────────
function setST(id,val,e){
  ST[id]=val;
  updProg();
  document.querySelectorAll('.sa-btn').forEach(b=>b.classList.remove('ss','su'));
  if(e?.target) e.target.classList.add(val==='sicher'?'ss':'su');
  const nb=document.getElementById('n'+id);
  if(nb){nb.className='nb active';nb.classList.add(val==='sicher'?'done':'warn');}
  renderSec(SECS[id]);
}
function updProg(){
  const done=Object.keys(ST).filter(k=>ST[k]==='sicher').length;
  const total=SECS.length;
  document.getElementById('pb').style.width=Math.round(done/total*100)+'%';
  document.getElementById('pbl').textContent=`${done} von ${total} Lernzielen als "Sicher" markiert`;
  SECS.forEach(s=>{
    const nb=document.getElementById('n'+s.id); if(!nb) return;
    const wa=nb.classList.contains('active');
    nb.className='nb'+(wa?' active':'');
    if(ST[s.id]==='sicher') nb.classList.add('done');
    else if(ST[s.id]==='unsicher') nb.classList.add('warn');
  });
}

// ─── TOGGLE BODY ──────────────────────────────
function toggleBody(id){
  const b=document.getElementById('body-'+id);
  const c=document.getElementById('chev-'+id);
  const v=b.style.display!=='none';
  b.style.display=v?'none':'block';
  c.textContent=v?'›':'▼';
}

// ─── FINAL EVAL ───────────────────────────────
function renderEval(){
  const sicher=SECS.filter(s=>ST[s.id]==='sicher').length;
  const total=SECS.length;
  const pct=Math.round(sicher/total*100);
  const cat=pct>=80?'gr':pct>=50?'go':'gw';
  const emoji=pct>=80?'🎉':pct>=50?'👍':'💪';
  const msg=pct>=80?'Sehr gut vorbereitet!':pct>=50?'Guter Fortschritt!':'Noch Übungsbedarf';
  const sub=pct>=80?'Du bist bereit für die Überprüfung.':pct>=50?'Arbeite nochmal an den unsicheren Themen.':'Geh alle roten Themen nochmal durch!';

  // Build recommendations
  const unsicherSecs=SECS.filter(s=>ST[s.id]==='unsicher'||!ST[s.id]);
  let recos='';
  if(unsicherSecs.length>0){
    recos=`<div class="reco-box">
      <strong>📚 Deine Lernempfehlung für die Überprüfung:</strong>
      ${unsicherSecs.map(s=>`• <strong>${s.title}</strong> – Schau nochmal: ${s.recoPage}`).join('<br>')}
      <br><br>🎯 <strong>Besonders wichtig für die Überprüfung:</strong><br>
      • AFB I: Begriffe erklären können (Gleichschaltung, Führerprinzip, Antisemitismus)<br>
      • AFB II: Quelle M1 (Schacht-Brief) vorstellen und Inhalt erklären<br>
      • AFB III: Wirtschaftsaufschwung beurteilen – Schein vs. Wirklichkeit
    </div>`;
  }

  let trH='';
  SECS.forEach(s=>{
    const st=ST[s.id];
    const ico=st==='sicher'?'✅':st==='unsicher'?'⚠️':'⭕';
    const bdgCls=st==='sicher'?'g':st==='unsicher'?'o':'r';
    const bdgLbl=st==='sicher'?'Sicher':st==='unsicher'?'Noch üben!':'Nicht bearbeitet';
    trH+=`<div class="tr">
      <div class="tr-ico">${ico}</div>
      <div class="tr-info">
        <div class="tr-ttl">${s.title}</div>
        <div class="tr-sub">${s.desc}</div>
      </div>
      <div class="tr-bdg ${bdgCls}">${bdgLbl}</div>
    </div>`;
  });

  const h=`
  <button class="back-btn" onclick="go('ov')">‹ Zurück zur Übersicht</button>
  <div class="card" style="overflow:visible">
    <div style="padding:14px 16px">
      <div class="eval-hdr ${cat}">
        <div class="eval-score">${emoji} ${pct}%</div>
        <div class="eval-msg">${msg}</div>
        <div class="eval-sub">${sub}</div>
      </div>
      <div style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Thema für Thema</div>
      <div class="tr-list">${trH}</div>
      ${recos}
      <button class="restart-btn" onclick="go('ov')">🔄 Zurück – nochmal üben</button>
    </div>
  </div>`;
  document.getElementById('mc').innerHTML=h;
}

// ─── NAVIGATION ───────────────────────────────
function go(id){
  cur=id;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  if(id==='ov'){document.querySelector('.nb').classList.add('active');renderOV();}
  else if(id==='eval'){renderEval();}
  else {
    const nb=document.getElementById('n'+id); if(nb) nb.classList.add('active');
    renderSec(SECS[id]);
  }
}

go('ov');
</script>
</body>
</html>
