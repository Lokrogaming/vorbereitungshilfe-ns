<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorbereitungshilfe – Geschichte Klasse 9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}

/* HEADER */
.header{background:#1C1C1A;color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:18px;margin-bottom:3px}
.header p{font-size:13px;color:#aaa}
.progress-bar-wrap{margin-top:10px;background:#333;border-radius:8px;height:10px;overflow:hidden}
.progress-bar{height:10px;background:linear-gradient(90deg,#1A5E36,#2ecc71);border-radius:8px;transition:width .5s}
.progress-label{font-size:12px;color:#aaa;margin-top:4px;text-align:right}

/* NAV */
.nav{display:flex;gap:6px;padding:12px 16px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:wrap}
.nav-btn{padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.nav-btn.active{background:#1C1C1A;color:#fff;border-color:#1C1C1A}
.nav-btn.done{border-color:#1A5E36;color:#1A5E36}
.nav-btn.warn{border-color:#e67e22;color:#e67e22}

/* MAIN */
.main{padding:16px;max-width:820px;margin:0 auto}

/* TOPIC CARD */
.topic-card{background:#fff;border-radius:12px;border:1.5px solid #e8e8e8;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topic-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.topic-header h2{font-size:16px;font-weight:600}
.topic-status{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px}
.badge.sicher{background:#e8f5e9;color:#1A5E36}
.badge.unsicher{background:#fff3e0;color:#e65100}
.badge.offen{background:#f3f3f3;color:#666}
.chevron{font-size:14px;transition:transform .3s;color:#999}
.topic-body{display:none;border-top:1px solid #f0f0f0}
.topic-body.open{display:block}

/* SELF-ASSESS */
.self-assess{padding:14px 18px;background:#fafafa;border-bottom:1px solid #f0f0f0}
.self-assess p{font-size:14px;color:#444;margin-bottom:10px}
.assess-btns{display:flex;gap:8px;flex-wrap:wrap}
.assess-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:13px;cursor:pointer;transition:all .15s}
.assess-btn.selected-sicher{background:#1A5E36;color:#fff;border-color:#1A5E36}
.assess-btn.selected-unsicher{background:#e65100;color:#fff;border-color:#e65100}

/* EXERCISES */
.exercises{padding:14px 18px}
.ex-title{font-size:13px;font-weight:600;color:#555;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
.exercise{background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:12px;border-left:3px solid #ccc}
.exercise.afb1{border-left-color:#3498db}
.exercise.afb2{border-left-color:#8e44ad}
.exercise.afb3{border-left-color:#e67e22}
.exercise .afb-badge{font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.afb1 .afb-badge{color:#3498db}
.afb2 .afb-badge{color:#8e44ad}
.afb3 .afb-badge{color:#e67e22}
.exercise .question{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.5}
.exercise .source-box{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:13px;font-style:italic;color:#444;line-height:1.6}
.answer-area{width:100%;min-height:80px;border:1.5px solid #ddd;border-radius:6px;padding:8px 10px;font-family:Arial;font-size:14px;resize:vertical;background:#fff}
.answer-area:focus{outline:none;border-color:#1A5E36}
.ex-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.show-ans-btn{background:none;border:1.5px solid #1A5E36;color:#1A5E36;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer}
.show-ans-btn:hover{background:#1A5E36;color:#fff}
.answer-reveal{background:#e8f5e9;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:13px;color:#1a3a1a;display:none;line-height:1.6}
.answer-reveal.visible{display:block}
.pts{font-size:12px;color:#888}

/* MC */
.mc-options{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.mc-opt{display:flex;align-items:flex-start;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:14px;transition:all .15s}
.mc-opt:hover{border-color:#1A5E36}
.mc-opt.correct{border-color:#1A5E36;background:#e8f5e9}
.mc-opt.wrong{border-color:#c0392b;background:#fde8e8}
.mc-opt input{margin-top:2px;flex-shrink:0}

/* BEGRIFFE MATCH */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.match-col{display:flex;flex-direction:column;gap:6px}
.match-item{padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;border:1.5px solid #ddd;background:#fff;transition:all .15s;text-align:center}
.match-item.selected{border-color:#1A5E36;background:#e8f5e9}
.match-item.matched{border-color:#1A5E36;background:#c8e6c9;cursor:default}
.match-item.wrong-match{border-color:#c0392b;background:#fde8e8}

/* FEEDBACK BOX */
.feedback{padding:12px 18px;border-top:1px solid #f0f0f0}
.feedback-hint{background:#fff8e1;border-left:3px solid #f39c12;border-radius:0 6px 6px 0;padding:10px 14px;font-size:13px;color:#5d4037;display:none}
.feedback-hint.visible{display:block}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:4px}
.ov-card{background:#fff;border-radius:10px;padding:14px;border:1.5px solid #e8e8e8;text-align:center;font-size:13px}
.ov-card .ov-icon{font-size:28px;margin-bottom:6px}
.ov-card .ov-label{font-size:12px;color:#888;margin-bottom:4px}
.ov-card .ov-val{font-size:20px;font-weight:700}
.ov-card.green .ov-val{color:#1A5E36}
.ov-card.orange .ov-val{color:#e65100}

/* SECTION DIVIDER */
.sec-div{font-size:11px;font-weight:700;color:#999;letter-spacing:.1em;text-transform:uppercase;padding:0 0 8px;margin-top:4px}
</style>
</head>
<body>

<div class="header">
  <h1>Vorbereitungshilfe – Geschichte Klasse 9</h1>
  <p>Thema: Nationalsozialismus – Aus einer Demokratie wird eine Diktatur</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progBar" style="width:0%"></div></div>
  <div class="progress-label" id="progLabel">0 von 7 Lernzielen bearbeitet</div>
</div>

<div class="nav" id="navBar">
  <button class="nav-btn active" onclick="showSection('overview')">Übersicht</button>
  <button class="nav-btn" id="nav-0" onclick="showSection(0)">Begriffe</button>
  <button class="nav-btn" id="nav-1" onclick="showSection(1)">Quellenanalyse</button>
  <button class="nav-btn" id="nav-2" onclick="showSection(2)">Stationen Diktatur</button>
  <button class="nav-btn" id="nav-3" onclick="showSection(3)">NS-Ideologie</button>
  <button class="nav-btn" id="nav-4" onclick="showSection(4)">Reichstagsbrand</button>
  <button class="nav-btn" id="nav-5" onclick="showSection(5)">Wirtschaft</button>
  <button class="nav-btn" id="nav-6" onclick="showSection(6)">Unterstützung Hitler</button>
</div>

<div class="main" id="mainContent"></div>

<script>
const STATUS = {};
const SECTIONS = [
  {
    id:0, title:"Begriffe erklären",
    desc:"Gleichschaltung · Antisemitismus · Führerprinzip · Lebensraum · Ideologie",
    ref:"AB Baustein 3 | SB S. 136–138",
    exercises:[
      {
        type:"mc", afb:1, pts:4,
        q:"Was versteht man unter dem Begriff 'Gleichschaltung'?",
        options:[
          {t:"Die Einführung gleicher Löhne für alle Deutschen.", correct:false},
          {t:"Die Gleichstellung von Frauen und Männern.", correct:false},
          {t:"Die Unterordnung aller staatlichen und gesellschaftlichen Bereiche unter die NSDAP.", correct:true},
          {t:"Die Einführung eines einheitlichen Schulsystems.", correct:false},
        ],
        answer:"Gleichschaltung bezeichnet die Unterordnung aller Bereiche des öffentlichen Lebens (Länder, Parteien, Gewerkschaften, Medien) unter die Kontrolle der NSDAP ab 1933."
      },
      {
        type:"match", afb:1, pts:5,
        q:"Ordne die Begriffe den richtigen Erklärungen zu.",
        pairs:[
          ["Antisemitismus","Feindschaft und Hass gegenüber Juden"],
          ["Führerprinzip","Unbedingte Unterordnung unter Hitler"],
          ["Lebensraum","Forderung nach Land im Osten Europas"],
          ["Ideologie","Weltanschauung / politisches Gedankensystem"],
          ["Mefo-Wechsel","Versteckte Staatsschulden für Rüstung"],
        ]
      },
      {
        type:"open", afb:2, pts:4,
        q:"Erkläre in 2–3 Sätzen: Was verstand Hitler unter dem Begriff 'Lebensraum'?",
        answer:"Hitler verstand unter 'Lebensraum' die Forderung nach neuem Land für das deutsche Volk – vor allem in Osteuropa (Russland, Ukraine). Er rechtfertigte die gewaltsame Eroberung dieser Gebiete mit der angeblichen Überlegenheit der deutschen Rasse. Die dort lebende Bevölkerung sollte vertrieben oder vernichtet werden."
      }
    ]
  },
  {
    id:1, title:"Schriftliche Quelle analysieren",
    desc:"Quellenvorstellung · Inhalt erschließen · Standpunkt erkennen",
    ref:"AB Baustein 1–3",
    exercises:[
      {
        type:"open", afb:1, pts:4,
        q:"Lies den Quellenausschnitt und stelle ihn strukturiert vor (Autor, Quellenart, Zeit, Thema).",
        source:'"In erschreckenden Massen wird die Währung von der schrankenlos betriebenen Ausgabewirtschaft der öffentlichen Hand bedroht [...] Keine Notenbank ist imstande, die Ausgabenwirtschaft eines Staates aufrechtzuerhalten gegen eine inflationistische Ausgabepolitik des Staates." — Hjalmar Schacht, Brief an die Reichsbank-Direktoren, 7. Januar 1939',
        answer:"Autor: Hjalmar Schacht, Präsident der Deutschen Reichsbank. Quellenart: Interner Brief (Primärquelle). Entstehungszeit: 7. Januar 1939. Thema: Schacht warnt vor dem drohenden Staatsbankrott durch die unkontrollierten Ausgaben der NS-Regierung."
      },
      {
        type:"open", afb:2, pts:5,
        q:"Welche Kritik übt Schacht in seinem Brief? Erkläre in eigenen Worten.",
        source:"(Quelle siehe oben)",
        answer:"Schacht kritisiert, dass die NS-Regierung maßlos Geld ausgibt, ohne es zu haben. Diese 'uferlosen Ausgaben' (vor allem für Rüstung) gefährden die deutsche Währung und drohen den Staat in den Bankrott zu treiben. Keine Notenbank der Welt könne eine solche Ausgabenpolitik dauerhaft stützen."
      }
    ]
  },
  {
    id:2, title:"Stationen auf dem Weg zur NS-Diktatur",
    desc:"Chronik · Ermächtigungsgesetz · Stufenmodell",
    ref:"Tafelbild Stufenmodell | Artefakt: stephmeu.github.io/Machtergreifung",
    exercises:[
      {
        type:"order", afb:1, pts:6,
        q:"Bringe die Ereignisse in die richtige Reihenfolge (1 = zuerst, 6 = zuletzt).",
        items:[
          {t:"Ermächtigungsgesetz – Hitler regiert ohne Parlament",correct:4},
          {t:"30. Januar 1933: Hitler wird Reichskanzler",correct:1},
          {t:"Gleichschaltung der Länder, Parteien und Gewerkschaften",correct:5},
          {t:"Reichstagsbrand – Kommunisten werden beschuldigt",correct:2},
          {t:"Reichstagsbrandverordnung – Grundrechte außer Kraft",correct:3},
          {t:"Vereinigung Kanzler + Präsident: Hitler = Führer",correct:6},
        ],
        answer:"Richtige Reihenfolge: 1) Hitler Reichskanzler (30.1.1933) → 2) Reichstagsbrand (27./28.2.1933) → 3) Reichstagsbrandverordnung (28.2.1933) → 4) Ermächtigungsgesetz (23.3.1933) → 5) Gleichschaltung (März–Juli 1933) → 6) Hitler = Führer und Reichskanzler (2.8.1934)"
      },
      {
        type:"open", afb:2, pts:4,
        q:"Erkläre: Was erlaubte das Ermächtigungsgesetz (23. März 1933) Hitler?",
        answer:"Das Ermächtigungsgesetz erlaubte der Reichsregierung, Gesetze ohne Zustimmung des Reichstags zu erlassen. Diese Gesetze durften sogar von der Weimarer Verfassung abweichen. Damit war die parlamentarische Demokratie faktisch abgeschafft – Hitler konnte alleine regieren."
      }
    ]
  },
  {
    id:3, title:"NS-Ideologie erklären",
    desc:"Rassismus · Antisemitismus · Lebensraum · Führerprinzip · Gewalt",
    ref:"SB S. 136–138",
    exercises:[
      {
        type:"mc", afb:1, pts:4,
        q:"Welche der folgenden Aussagen entspricht NICHT der NS-Ideologie?",
        options:[
          {t:"Die Deutschen gehören zu einer überlegenen Rasse.", correct:false},
          {t:"Das Volk braucht mehr Lebensraum im Osten.", correct:false},
          {t:"Alle Menschen sind gleichwertig und haben gleiche Rechte.", correct:true},
          {t:"Der Führer hat uneingeschränkte Macht.", correct:false},
        ],
        answer:"'Alle Menschen sind gleichwertig' widerspricht der NS-Ideologie grundlegend. Die Nazis glaubten an eine rassische Hierarchie mit den 'Ariern' an der Spitze und sahen andere Völker als minderwertig an."
      },
      {
        type:"open", afb:3, pts:6,
        q:"Beurteile: Warum konnten die Ideen Hitlers (aus 'Mein Kampf') für viele Deutsche attraktiv erscheinen? Nenne zwei Gründe.",
        answer:"1) In der Weltwirtschaftskrise boten Hitlers einfache Erklärungen und Feindbilder Orientierung – die Schuld wurde auf 'die Juden', 'die Kommunisten' gegeben. Das gab Menschen Halt in einer unsicheren Zeit. / 2) Das Versprechen von nationaler Größe und Stärke sprach viele an, die die 'Schmach von Versailles' als tief verletzend empfanden."
      }
    ]
  },
  {
    id:4, title:"Reichstagsbrand & Verordnung",
    desc:"Ursachen · Reichstagsbrandverordnung · Folgen für Grundrechte",
    ref:"AB Baustein 1",
    exercises:[
      {
        type:"mc", afb:1, pts:4,
        q:"Welche Grundrechte wurden durch die Reichstagsbrandverordnung (28.2.1933) außer Kraft gesetzt?",
        options:[
          {t:"Nur die Pressefreiheit.", correct:false},
          {t:"Meinungsfreiheit, Pressefreiheit, Versammlungsfreiheit, Briefgeheimnis und mehr.", correct:true},
          {t:"Das Wahlrecht der Frauen.", correct:false},
          {t:"Das Recht auf Arbeit.", correct:false},
        ],
        answer:"Die Reichstagsbrandverordnung setzte Artikel 114, 115, 117, 118, 123, 124 und 153 der Weimarer Verfassung außer Kraft – darunter persönliche Freiheit, Meinungsfreiheit, Pressefreiheit, Versammlungsrecht und Briefgeheimnis."
      },
      {
        type:"open", afb:2, pts:5,
        q:"Erkläre, womit die NS-Regierung den Erlass der Reichstagsbrandverordnung begründete – und was die tatsächlichen Folgen waren.",
        answer:"Begründung: Die Verordnung wurde mit der angeblichen kommunistischen Bedrohung begründet – der Reichstagsbrand sei ein kommunistischer Anschlag gewesen. / Folgen: Politische Gegner (vor allem KPD und SPD) konnten ohne Rechtsgrundlage verhaftet werden. Grundrechte galten nicht mehr. Die NSDAP nutzte die Verordnung zur Ausschaltung der politischen Opposition."
      }
    ]
  },
  {
    id:5, title:"Wirtschaftsaufschwung beurteilen",
    desc:"Arbeitslosigkeit · Mefo-Wechsel · Rüstungskonjunktur · Schein vs. Wirklichkeit",
    ref:"SB S. 148–149",
    exercises:[
      {
        type:"open", afb:1, pts:3,
        q:"Beschreibe, was das Diagramm M1 (Arbeitslosigkeit 1932–1938) zeigt. Nutze Zahlen.",
        answer:"Die Arbeitslosigkeit sank von ca. 6 Millionen Arbeitslosen im Jahr 1932 auf nahezu 0 im Jahr 1938. Die Kurve fällt stetig ab – besonders stark zwischen 1933 und 1936."
      },
      {
        type:"open", afb:2, pts:5,
        q:"Erkläre, warum der Wirtschaftsaufschwung nach 1933 kein 'echtes' Wirtschaftswunder war. Nenne zwei Hintergründe.",
        answer:"1) Mefo-Wechsel: Der Staat bezahlte Rüstungsunternehmen mit Schuldversprechen statt echtem Geld. Die Schulden wuchsen auf 12 Mrd. RM – geheim gehalten. / 2) Rüstungskonjunktur: Die Vollbeschäftigung entstand vor allem durch Rüstungsausgaben. Das war keine nachhaltige Wirtschaft, sondern Kriegsvorbereitung."
      },
      {
        type:"open", afb:3, pts:6,
        q:"Beurteile mithilfe der Quelle M1 (Schacht) und deinem Wissen: War der NS-Wirtschaftsaufschwung ein echter Erfolg?",
        source:'"Keine Notenbank ist imstande, die Ausgabenwirtschaft eines Staates aufrechtzuerhalten gegen eine inflationistische Ausgabepolitik des Staates." — Schacht, Januar 1939',
        answer:"Einerseits: Die Arbeitslosigkeit sank real, Menschen hatten wieder Arbeit und Einkommen. Das war für viele Zeitgenossen eine echte Verbesserung (vgl. Eva Sternheim). / Andererseits: Schacht selbst warnt 1939 vor dem drohenden Staatsbankrott. Der Aufschwung beruhte auf versteckten Schulden und Rüstungsausgaben – kein nachhaltiger Wohlstand. / Fazit: Kein echtes Wirtschaftswunder, sondern eine Scheinkonjunktur auf Kosten zukünftiger Generationen und zur Vorbereitung des Krieges."
      }
    ]
  },
  {
    id:6, title:"Warum unterstützten viele Deutsche Hitler?",
    desc:"Wirtschaft · Propaganda · Gleichschaltung · Zustimmung",
    ref:"SB S. 148–149",
    exercises:[
      {
        type:"mc", afb:1, pts:3,
        q:"Welcher der folgenden Faktoren erklärt NICHT, warum viele Deutsche Hitler unterstützten?",
        options:[
          {t:"Der Wirtschaftsaufschwung und sinkende Arbeitslosigkeit.", correct:false},
          {t:"Die Abschaffung des Versailler Vertrags versprechend.", correct:false},
          {t:"Hitlers freie und demokratische Wahl durch alle Deutschen.", correct:true},
          {t:"Propaganda über Volksempfänger und gleichgeschaltete Medien.", correct:false},
        ],
        answer:"Hitler wurde nie in einer freien, demokratischen Wahl von allen Deutschen gewählt. Er wurde am 30. Januar 1933 vom Reichspräsidenten zum Reichskanzler ernannt. Spätere Wahlen fanden unter Druck und Terror statt."
      },
      {
        type:"open", afb:3, pts:6,
        q:"Beurteile: Hätten die Menschen 1933 erkennen können, wohin Hitlers Politik führen würde? Begründe deine Antwort.",
        answer:"Einerseits: 'Mein Kampf' war öffentlich zugänglich – Hitlers Pläne (Antisemitismus, Lebensraum, Diktatur) waren bekannt. Wer das Buch gelesen hatte, wusste, was kommen würde. / Andererseits: Propaganda verhinderte kritisches Denken. Viele erlebten nur die positiven Seiten (Arbeit, Stabilität). Angst vor Repression hielt viele davon ab, offen zu zweifeln. / Fazit: Hinweise gab es – aber Propaganda, Gleichschaltung und die eigene Not haben viele daran gehindert, das volle Bild zu sehen."
      }
    ]
  }
];

let currentSection = 'overview';
const answered = {};
const matchState = {};

function showSection(id) {
  currentSection = id;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'overview') {
    document.querySelector('.nav-btn:first-child').classList.add('active');
    renderOverview();
  } else {
    document.getElementById('nav-'+id)?.classList.add('active');
    renderSection(SECTIONS[id]);
  }
}

function renderOverview() {
  const total = SECTIONS.length;
  const done = SECTIONS.filter(s => STATUS[s.id] === 'sicher').length;
  const warn = SECTIONS.filter(s => STATUS[s.id] === 'unsicher').length;
  const offen = total - done - warn;

  let html = `
  <div class="sec-div" style="padding-top:4px">Dein Lernstand</div>
  <div class="overview-grid">
    <div class="ov-card green"><div class="ov-icon">✅</div><div class="ov-label">Sicher</div><div class="ov-val">${done}</div></div>
    <div class="ov-card orange"><div class="ov-icon">⚠️</div><div class="ov-label">Unsicher</div><div class="ov-val">${warn}</div></div>
    <div class="ov-card"><div class="ov-icon">📋</div><div class="ov-label">Noch offen</div><div class="ov-val">${offen}</div></div>
    <div class="ov-card"><div class="ov-icon">🎯</div><div class="ov-label">Lernziele</div><div class="ov-val">${total}</div></div>
  </div>`;

  if (warn > 0) {
    html += `<div style="background:#fff8e1;border-left:4px solid #f39c12;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:14px;color:#5d4037">
      <strong>Hinweis:</strong> Du hast ${warn} Bereich${warn>1?'e':''} als unsicher markiert. Klicke auf die markierten Themen und übe gezielt dort!
    </div>`;
  }
  if (done === total) {
    html += `<div style="background:#e8f5e9;border-left:4px solid #1A5E36;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:14px;color:#1a3a1a">
      <strong>Super!</strong> Du hast alle Lernziele bearbeitet. Viel Erfolg bei der Überprüfung! 🎉
    </div>`;
  }

  html += `<div class="sec-div" style="margin-top:16px">Alle Themen</div>`;
  SECTIONS.forEach(s => {
    const st = STATUS[s.id];
    const badge = st === 'sicher' ? '<span class="badge sicher">Sicher ✓</span>' :
                  st === 'unsicher' ? '<span class="badge unsicher">Unsicher ⚠</span>' :
                  '<span class="badge offen">Noch offen</span>';
    html += `<div class="topic-card" onclick="showSection(${s.id})" style="cursor:pointer">
      <div class="topic-header">
        <div><h2>${s.title}</h2><p style="font-size:13px;color:#888;margin-top:3px">${s.desc}</p></div>
        <div class="topic-status">${badge}<span style="font-size:18px;color:#999">›</span></div>
      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

function renderSection(sec) {
  let exHtml = '';
  sec.exercises.forEach((ex, i) => {
    const afbLabel = ex.afb === 1 ? 'AFB I – Wiedergabe' : ex.afb === 2 ? 'AFB II – Analyse' : 'AFB III – Beurteilung';
    const afbClass = 'afb'+ex.afb;
    exHtml += `<div class="exercise ${afbClass}" id="ex-${sec.id}-${i}">
      <div class="afb-badge">${afbLabel}</div>
      <div class="question">${ex.q}</div>`;

    if (ex.source) exHtml += `<div class="source-box">${ex.source}</div>`;

    if (ex.type === 'open') {
      exHtml += `<textarea class="answer-area" placeholder="Deine Antwort hier eingeben..." rows="4"></textarea>`;
    } else if (ex.type === 'mc') {
      exHtml += `<div class="mc-options" id="mc-${sec.id}-${i}">`;
      ex.options.forEach((o, oi) => {
        exHtml += `<div class="mc-opt" id="mcopt-${sec.id}-${i}-${oi}" onclick="checkMC(${sec.id},${i},${oi},${o.correct})">
          <input type="radio" name="mc-${sec.id}-${i}"> ${o.t}
        </div>`;
      });
      exHtml += `</div>`;
    } else if (ex.type === 'order') {
      const shuffled = [...ex.items].sort(() => Math.random() - 0.5);
      exHtml += `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px" id="ord-${sec.id}-${i}">`;
      shuffled.forEach((item, oi) => {
        exHtml += `<div style="display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:6px;padding:8px 12px;font-size:14px">
          <select style="border:1.5px solid #ddd;border-radius:4px;padding:4px;font-size:13px;background:#fff" id="ord-${sec.id}-${i}-${oi}">
            <option value="">–</option>
            ${[1,2,3,4,5,6].map(n=>`<option value="${n}">${n}</option>`).join('')}
          </select>
          ${item.t}
        </div>`;
      });
      exHtml += `</div>`;
    } else if (ex.type === 'match') {
      const terms = ex.pairs.map(p=>p[0]);
      const defs = [...ex.pairs.map(p=>p[1])].sort(()=>Math.random()-.5);
      exHtml += `<div class="match-wrap" id="match-wrap-${sec.id}-${i}">
        <div class="match-col" id="match-terms-${sec.id}-${i}">
          <div style="font-size:12px;color:#888;margin-bottom:2px;font-weight:600">Begriffe</div>
          ${terms.map((t,ti)=>`<div class="match-item" id="mt-${sec.id}-${i}-${ti}" onclick="selectMatchTerm(${sec.id},${i},${ti},'${t.replace(/'/g,"\\'")}')">
            ${t}
          </div>`).join('')}
        </div>
        <div class="match-col" id="match-defs-${sec.id}-${i}">
          <div style="font-size:12px;color:#888;margin-bottom:2px;font-weight:600">Erklärungen</div>
          ${defs.map((d,di)=>`<div class="match-item" id="md-${sec.id}-${i}-${di}" onclick="selectMatchDef(${sec.id},${i},${di},'${d.replace(/'/g,"\\'")}')">
            ${d}
          </div>`).join('')}
        </div>
      </div>`;
      if (!matchState[`${sec.id}-${i}`]) matchState[`${sec.id}-${i}`] = {term:null,def:null,pairs:ex.pairs};
    }

    exHtml += `<div class="ex-footer">
      <span class="pts">${ex.pts} Punkte</span>
      <button class="show-ans-btn" onclick="toggleAnswer(${sec.id},${i})">Musterlösung zeigen</button>
    </div>
    <div class="answer-reveal" id="ans-${sec.id}-${i}">${ex.answer}</div>
    </div>`;
  });

  const st = STATUS[sec.id];
  const html = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer" onclick="showSection('overview')">
    <span style="font-size:18px;color:#888">‹</span>
    <span style="font-size:14px;color:#888">Zurück zur Übersicht</span>
  </div>
  <div class="topic-card">
    <div class="topic-header" onclick="toggleCard(${sec.id})">
      <div>
        <h2>${sec.title}</h2>
        <p style="font-size:13px;color:#888;margin-top:3px">${sec.desc}</p>
        <p style="font-size:12px;color:#aaa;margin-top:2px">📚 ${sec.ref}</p>
      </div>
      <div class="topic-status">
        <span class="badge ${st||'offen'}">${st==='sicher'?'Sicher ✓':st==='unsicher'?'Unsicher ⚠':'Noch offen'}</span>
        <span class="chevron" id="chev-${sec.id}">▼</span>
      </div>
    </div>
    <div class="topic-body open" id="body-${sec.id}">
      <div class="self-assess">
        <p>Wie sicher fühlst du dich bei diesem Thema?</p>
        <div class="assess-btns">
          <button class="assess-btn ${st==='sicher'?'selected-sicher':''}" onclick="setStatus(${sec.id},'sicher')">✅ Sicher – ich kann das erklären</button>
          <button class="assess-btn ${st==='unsicher'?'selected-unsicher':''}" onclick="setStatus(${sec.id},'unsicher')">⚠️ Unsicher – ich muss üben</button>
        </div>
      </div>
      <div class="exercises">
        <div class="ex-title">Übungsaufgaben</div>
        ${exHtml}
      </div>
      ${st==='unsicher'?`<div class="feedback"><div class="feedback-hint visible">
        <strong>Tipp für unsichere Themen:</strong> Schau dir den Quellverweis oben an, lese den entsprechenden Abschnitt im Schulbuch nochmal durch und versuche dann die Aufgaben erneut. Zeige die Musterlösung erst, wenn du deine eigene Antwort geschrieben hast!
      </div></div>`:''}
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  body.classList.toggle('open');
  chev.textContent = body.classList.contains('open') ? '▼' : '›';
}

function setStatus(id, st) {
  STATUS[id] = st;
  updateProgress();
  document.querySelectorAll('.assess-btn').forEach(b => {
    b.classList.remove('selected-sicher','selected-unsicher');
  });
  event.target.classList.add('selected-'+st);
  // Update nav badge
  const navBtn = document.getElementById('nav-'+id);
  if (navBtn) {
    navBtn.className = 'nav-btn active ' + (st==='sicher'?'done':'warn');
  }
  // Show/hide hint
  const hint = document.querySelector('.feedback-hint');
  if (hint) hint.className = st==='unsicher' ? 'feedback-hint visible' : 'feedback-hint';
  renderSection(SECTIONS[id]);
}

function updateProgress() {
  const done = Object.keys(STATUS).filter(k => STATUS[k]==='sicher').length;
  const total = SECTIONS.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progBar').style.width = pct+'%';
  document.getElementById('progLabel').textContent = `${done} von ${total} Lernzielen als "Sicher" markiert`;
  // Update all nav btns
  SECTIONS.forEach(s => {
    const nb = document.getElementById('nav-'+s.id);
    if (!nb) return;
    const wasActive = nb.classList.contains('active');
    nb.className = 'nav-btn' + (wasActive?' active':'');
    if (STATUS[s.id]==='sicher') nb.classList.add('done');
    else if (STATUS[s.id]==='unsicher') nb.classList.add('warn');
  });
}

function toggleAnswer(sid, eid) {
  const el = document.getElementById(`ans-${sid}-${eid}`);
  el.classList.toggle('visible');
  const btn = el.previousElementSibling.querySelector('.show-ans-btn');
  if (btn) btn.textContent = el.classList.contains('visible') ? 'Musterlösung ausblenden' : 'Musterlösung zeigen';
}

function checkMC(sid, eid, oi, correct) {
  const opts = document.querySelectorAll(`[id^="mcopt-${sid}-${eid}-"]`);
  opts.forEach(o => {
    o.style.pointerEvents = 'none';
    const idx = parseInt(o.id.split('-').pop());
    if (idx === oi) o.classList.add(correct ? 'correct' : 'wrong');
  });
  if (correct) {
    const ans = document.getElementById(`ans-${sid}-${eid}`);
    ans.classList.add('visible');
  }
}

function selectMatchTerm(sid, eid, ti, term) {
  const key = `${sid}-${eid}`;
  const state = matchState[key];
  if (!state) return;
  // Clear previous term selection
  document.querySelectorAll(`[id^="mt-${sid}-${eid}-"]`).forEach(el => {
    if (!el.classList.contains('matched')) el.classList.remove('selected');
  });
  state.term = {idx:ti, val:term};
  document.getElementById(`mt-${sid}-${eid}-${ti}`).classList.add('selected');
  checkMatch(sid, eid);
}

function selectMatchDef(sid, eid, di, def) {
  const key = `${sid}-${eid}`;
  const state = matchState[key];
  if (!state) return;
  document.querySelectorAll(`[id^="md-${sid}-${eid}-"]`).forEach(el => {
    if (!el.classList.contains('matched')) el.classList.remove('selected');
  });
  state.def = {idx:di, val:def};
  document.getElementById(`md-${sid}-${eid}-${di}`).classList.add('selected');
  checkMatch(sid, eid);
}

function checkMatch(sid, eid) {
  const key = `${sid}-${eid}`;
  const state = matchState[key];
  if (!state || !state.term || !state.def) return;
  const correctDef = state.pairs.find(p => p[0] === state.term.val)?.[1];
  const isCorrect = correctDef === state.def.val;
  const termEl = document.getElementById(`mt-${sid}-${eid}-${state.term.idx}`);
  const defEl  = document.getElementById(`md-${sid}-${eid}-${state.def.idx}`);
  if (isCorrect) {
    termEl.classList.add('matched'); termEl.classList.remove('selected');
    defEl.classList.add('matched');  defEl.classList.remove('selected');
  } else {
    termEl.classList.add('wrong-match'); defEl.classList.add('wrong-match');
    setTimeout(() => {
      termEl.classList.remove('wrong-match','selected');
      defEl.classList.remove('wrong-match','selected');
    }, 800);
  }
  state.term = null; state.def = null;
}

// Init
renderOverview();
</script>
</body>
</html>
