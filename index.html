<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}

.header{background:#1C1C1A;color:#fff;padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:17px;margin-bottom:2px}
.header p{font-size:12px;color:#aaa}
.progress-bar-wrap{margin-top:8px;background:#333;border-radius:8px;height:8px;overflow:hidden}
.progress-bar{height:8px;background:linear-gradient(90deg,#1A5E36,#2ecc71);border-radius:8px;transition:width .5s}
.progress-label{font-size:11px;color:#aaa;margin-top:3px;text-align:right}

.nav{display:flex;gap:6px;padding:10px 14px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:wrap}
.nav-btn{padding:6px 13px;border:1.5px solid #ddd;border-radius:20px;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
.nav-btn.active{background:#1C1C1A;color:#fff;border-color:#1C1C1A}
.nav-btn.done{border-color:#1A5E36;color:#1A5E36}
.nav-btn.warn{border-color:#e67e22;color:#e67e22}

.main{padding:14px;max-width:840px;margin:0 auto}

.card{background:#fff;border-radius:12px;border:1.5px solid #e8e8e8;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px}
.badge.sicher{background:#e8f5e9;color:#1A5E36}
.badge.unsicher{background:#fff3e0;color:#e65100}
.badge.offen{background:#f3f3f3;color:#666}

.self-assess{padding:12px 18px;background:#fafafa;border-bottom:1px solid #f0f0f0}
.self-assess p{font-size:13px;color:#444;margin-bottom:8px}
.assess-btns{display:flex;gap:8px;flex-wrap:wrap}
.assess-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .15s}
.assess-btn.sel-s{background:#1A5E36;color:#fff;border-color:#1A5E36}
.assess-btn.sel-u{background:#e65100;color:#fff;border-color:#e65100}

.exercises{padding:14px 18px}
.ex-section-title{font-size:11px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

.exercise{border-radius:8px;padding:14px;margin-bottom:12px;border-left:3px solid #ccc;background:#f8f9fa}
.exercise.afb1{border-left-color:#3498db;background:#f0f7ff}
.exercise.afb2{border-left-color:#8e44ad;background:#f8f0ff}
.exercise.afb3{border-left-color:#e67e22;background:#fff8f0}
.afb-badge{font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.afb1 .afb-badge{color:#2980b9}
.afb2 .afb-badge{color:#7d3c98}
.afb3 .afb-badge{color:#d35400}
.question{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.5}
.source-box{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:12px;font-style:italic;color:#444;line-height:1.6}

/* MC */
.mc-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.mc-opt{display:flex;align-items:flex-start;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px;transition:all .15s;line-height:1.4}
.mc-opt:hover:not(.locked){border-color:#1A5E36}
.mc-opt.correct{border-color:#1A5E36;background:#e8f5e9}
.mc-opt.wrong{border-color:#c0392b;background:#fde8e8}
.mc-opt .opt-icon{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.mc-opt.correct .opt-icon{background:#1A5E36;border-color:#1A5E36;color:#fff}
.mc-opt.wrong .opt-icon{background:#c0392b;border-color:#c0392b;color:#fff}

/* OPEN */
.answer-area{width:100%;min-height:80px;border:1.5px solid #ddd;border-radius:6px;padding:8px 10px;font-family:Arial;font-size:13px;resize:vertical;background:#fff;line-height:1.5}
.answer-area:focus{outline:none;border-color:#1A5E36}
.submit-btn{margin-top:8px;background:#1C1C1A;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer;transition:opacity .2s}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

.ai-feedback{border-radius:8px;padding:12px 14px;margin-top:8px;font-size:13px;line-height:1.7;display:none}
.ai-feedback.visible{display:block}
.ai-feedback.loading{background:#f0f0f0;color:#888;font-style:italic}
.ai-feedback.good{background:#e8f5e9;border-left:3px solid #1A5E36;color:#1a3a1a}
.ai-feedback.partial{background:#fff8e1;border-left:3px solid #f39c12;color:#5d4037}
.ai-feedback.poor{background:#fde8e8;border-left:3px solid #c0392b;color:#4a1010}
.ai-feedback .fb-header{font-weight:700;margin-bottom:6px;font-size:13px}
.ai-feedback .model-answer{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.1);font-size:12px;color:#555}

/* MATCH */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.match-col-label{font-size:11px;color:#888;font-weight:700;margin-bottom:4px}
.match-item{padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1.5px solid #ddd;background:#fff;transition:all .15s;text-align:center;line-height:1.4}
.match-item.selected{border-color:#1A5E36;background:#e8f5e9}
.match-item.matched{border-color:#1A5E36;background:#c8e6c9;cursor:default;color:#0a3d0a}
.match-item.wrong-match{border-color:#c0392b;background:#fde8e8}
.match-item.disabled{opacity:.5;cursor:default}

/* FINAL EVALUATION */
.eval-wrap{padding:16px}
.eval-header{text-align:center;padding:20px;border-radius:12px;margin-bottom:16px}
.eval-header.great{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.eval-header.good{background:linear-gradient(135deg,#e3f2fd,#bbdefb)}
.eval-header.needs-work{background:linear-gradient(135deg,#fff8e1,#ffe082)}
.eval-score{font-size:40px;font-weight:700;margin-bottom:6px}
.eval-msg{font-size:15px;font-weight:600;color:#333}
.eval-sub{font-size:13px;color:#666;margin-top:4px}
.topic-results{display:flex;flex-direction:column;gap:8px}
.topic-result{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e8e8e8}
.topic-result .tr-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.topic-result .tr-info{flex:1}
.topic-result .tr-title{font-size:13px;font-weight:600}
.topic-result .tr-score{font-size:12px;color:#888;margin-top:2px}
.topic-result .tr-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
.tr-badge.gut{background:#e8f5e9;color:#1A5E36}
.tr-badge.mittel{background:#fff8e1;color:#e65100}
.tr-badge.schwach{background:#fde8e8;color:#c0392b}
.restart-btn{display:block;width:100%;margin-top:14px;padding:12px;background:#1C1C1A;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;text-align:center}
.restart-btn:hover{background:#333}

/* OVERVIEW CARDS */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.ov-card{background:#fff;border-radius:10px;padding:14px;border:1.5px solid #e8e8e8;text-align:center}
.ov-icon{font-size:26px;margin-bottom:4px}
.ov-label{font-size:11px;color:#888;margin-bottom:2px}
.ov-val{font-size:22px;font-weight:700}
.ov-val.green{color:#1A5E36}
.ov-val.orange{color:#e65100}

.hint-box{background:#fff8e1;border-left:4px solid #f39c12;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#5d4037;margin:10px 0}

.eval-btn-wrap{margin-top:16px;text-align:center}
.eval-btn{background:#1A5E36;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer}
.eval-btn:hover{background:#0F3D22}

.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#888;cursor:pointer;margin-bottom:12px;background:none;border:none;padding:0}
.back-btn:hover{color:#333}
</style>
</head>

// ── RENDER OVERVIEW ────────────────────────────
function renderOverview() {
  const total = SECTIONS.length;
  const done  = SECTIONS.filter(s=>STATUS[s.id]==='sicher').length;
  const warn  = SECTIONS.filter(s=>STATUS[s.id]==='unsicher').length;
  const allAnswered = SECTIONS.every(s=>STATUS[s.id]);

  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px">
    <div class="ov-card"><div class="ov-icon">✅</div><div class="ov-label">Sicher</div><div class="ov-val green">${done}</div></div>
    <div class="ov-card"><div class="ov-icon">⚠️</div><div class="ov-label">Unsicher</div><div class="ov-val orange">${warn}</div></div>
    <div class="ov-card"><div class="ov-icon">📋</div><div class="ov-label">Noch offen</div><div class="ov-val">${total-done-warn}</div></div>
  </div>`;

  if(warn>0) html+=`<div class="hint-box">⚠️ <strong>${warn} unsichere${warn>1?' Themen':' Thema'}</strong> – klicke auf die orange markierten Themen und übe dort!</div>`;
  if(done===total) html+=`<div style="background:#e8f5e9;border-left:4px solid #1A5E36;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#1a3a1a">🎉 <strong>Super!</strong> Alle Lernziele bearbeitet. Viel Erfolg bei der Überprüfung!</div>`;

  SECTIONS.forEach(s=>{
    const st=STATUS[s.id];
    const badge=st==='sicher'?'<span class="badge sicher">✓ Sicher</span>':st==='unsicher'?'<span class="badge unsicher">⚠ Unsicher</span>':'<span class="badge offen">Offen</span>';
    const sc=SCORES[s.id];
    const scText=sc?`<span style="font-size:11px;color:#888;margin-left:8px">${sc.points}/${sc.max} Pkt.</span>`:'';
    html+=`<div class="card" onclick="showSection(${s.id})" style="cursor:pointer">
      <div class="card-header">
        <div><h2>${s.title}${scText}</h2><p style="font-size:12px;color:#888;margin-top:2px">${s.desc}</p></div>
        <div style="display:flex;align-items:center;gap:6px">${badge}<span style="color:#ccc">›</span></div>
      </div>
    </div>`;
  });

  if(allAnswered) html+=`<div class="eval-btn-wrap"><button class="eval-btn" onclick="showSection('eval')">📊 Gesamtauswertung ansehen</button></div>`;

  document.getElementById('mainContent').innerHTML=html;
}

// ── RENDER SECTION ─────────────────────────────
function renderSection(sec) {
  const st=STATUS[sec.id];
  let exHtml='';
  sec.exercises.forEach((ex,i)=>{
    const afbLabel=ex.afb===1?'AFB I – Wiedergabe':ex.afb===2?'AFB II – Analyse/Erklärung':'AFB III – Beurteilung';
    exHtml+=`<div class="exercise afb${ex.afb}" id="ex-${sec.id}-${i}">
      <div class="afb-badge">${afbLabel} · ${ex.pts} Punkte</div>`;

    if(ex.type==='mc_pool'){
      const q=pickMC(MC_POOLS[ex.pool])[0];
      const opts=shuffleOpts(q.opts);
      exHtml+=`<div class="question">${q.q}</div>
        <div class="mc-opts" id="mc-${sec.id}-${i}">`;
      opts.forEach((o,oi)=>{
        exHtml+=`<div class="mc-opt" id="mo-${sec.id}-${i}-${oi}" onclick="checkMC(${sec.id},${i},${oi},${o.c})">
          <div class="opt-icon" id="oi-${sec.id}-${i}-${oi}"></div>${o.t}
        </div>`;
      });
      exHtml+=`</div>`;
    } else if(ex.type==='open'){
      if(ex.source) exHtml+=`<div class="source-box">${ex.source}</div>`;
      exHtml+=`<div class="question">${ex.q}</div>
        <textarea class="answer-area" id="ta-${sec.id}-${i}" placeholder="Schreibe deine Antwort hier…" rows="4"></textarea>
        <button class="submit-btn" id="sb-${sec.id}-${i}" onclick="submitOpen(${sec.id},${i})">✓ Antwort bewerten lassen</button>
        <div class="ai-feedback" id="fb-${sec.id}-${i}"></div>`;
    }
    exHtml+=`</div>`;
  });

  const html=`
  <button class="back-btn" onclick="showSection('overview')">‹ Zurück zur Übersicht</button>
  <div class="card">
    <div class="card-header" onclick="toggleBody(${sec.id})" style="cursor:pointer">
      <div>
        <h2>${sec.title}</h2>
        <p style="font-size:12px;color:#888;margin-top:2px">${sec.desc}</p>
        <p style="font-size:11px;color:#bbb;margin-top:2px">📚 ${sec.ref}</p>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="badge ${st||'offen'}">${st==='sicher'?'✓ Sicher':st==='unsicher'?'⚠ Unsicher':'Offen'}</span>
        <span id="chev-${sec.id}" style="color:#aaa;font-size:16px">▼</span>
      </div>
    </div>
    <div id="body-${sec.id}">
      <div class="self-assess">
        <p>Wie sicher fühlst du dich bei diesem Thema?</p>
        <div class="assess-btns">
          <button class="assess-btn ${st==='sicher'?'sel-s':''}" onclick="setStatus(${sec.id},'sicher',event)">✅ Ich kann das erklären</button>
          <button class="assess-btn ${st==='unsicher'?'sel-u':''}" onclick="setStatus(${sec.id},'unsicher',event)">⚠️ Ich muss noch üben</button>
        </div>
      </div>
      <div class="exercises">
        <div class="ex-section-title">Übungsaufgaben</div>
        ${exHtml}
      </div>
      ${st==='unsicher'?`<div style="padding:10px 18px 14px"><div class="hint-box">💡 <strong>Tipp:</strong> Schau ins Schulbuch (${sec.ref}), lies nochmal durch und versuche dann die Aufgaben erneut. Schreibe immer zuerst deine eigene Antwort, bevor du die KI-Bewertung anforderst!</div></div>`:''}
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML=html;
}

// ── TOGGLE ─────────────────────────────────────
function toggleBody(id){
  const body=document.getElementById('body-'+id);
  const ch=document.getElementById('chev-'+id);
  const vis=body.style.display!=='none';
  body.style.display=vis?'none':'block';
  ch.textContent=vis?'›':'▼';
}

// ── MC CHECK ───────────────────────────────────
function checkMC(sid,eid,oi,correct){
  document.querySelectorAll(`[id^="mo-${sid}-${eid}-"]`).forEach(el=>{
    el.classList.add('locked');
    el.style.pointerEvents='none';
  });
  const el=document.getElementById(`mo-${sid}-${eid}-${oi}`);
  const ic=document.getElementById(`oi-${sid}-${eid}-${oi}`);
  el.classList.add(correct?'correct':'wrong');
  ic.textContent=correct?'✓':'✗';

  // If wrong, show correct
  if(!correct){
    document.querySelectorAll(`[id^="mo-${sid}-${eid}-"]`).forEach((el2,i)=>{
      const allOpts=MC_POOLS[SECTIONS[sid].exercises[eid].pool];
      // We can't easily recover which was correct without storing state
    });
  }

  if(!SCORES[sid]) SCORES[sid]={points:0,max:0};
  const pts=SECTIONS[sid].exercises[eid].pts;
  if(!AI_RESULTS[`${sid}-${eid}`]){
    AI_RESULTS[`${sid}-${eid}`]={done:true};
    SCORES[sid].max+=pts;
    if(correct) SCORES[sid].points+=pts;
  }
}

// ── OPEN SUBMIT + AI ───────────────────────────
async function submitOpen(sid,eid){
  const ta=document.getElementById(`ta-${sid}-${eid}`);
  const fb=document.getElementById(`fb-${sid}-${eid}`);
  const btn=document.getElementById(`sb-${sid}-${eid}`);
  const answer=ta.value.trim();
  if(!answer){alert('Bitte zuerst eine Antwort eingeben!');return;}

  btn.disabled=true;
  btn.textContent='⏳ Wird bewertet…';
  fb.className='ai-feedback loading visible';
  fb.textContent='Claude bewertet deine Antwort…';

  const ex=SECTIONS[sid].exercises[eid];
  const prompt=`Du bist ein erfahrener Geschichtslehrer an einem deutschen Gymnasium (Klasse 9). Bewerte die folgende Schülerantwort.

AUFGABE: ${ex.q}
${ex.source?'QUELLE: '+ex.source:''}
MUSTERLÖSUNG: ${ex.modelAnswer}
BEWERTUNGSKRITERIEN: ${ex.rubric}
SCHÜLERANTWORT: "${answer}"

Antworte NUR im folgenden JSON-Format (kein anderer Text):
{
  "rating": "good" oder "partial" oder "poor",
  "feedback": "1-2 Sätze direktes, ermutigigendes Feedback auf Deutsch, was gut war",
  "missing": "1 Satz was noch fehlt oder verbessert werden kann (leer lassen wenn rating=good)",
  "points": Zahl zwischen 0 und ${ex.pts}
}`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);

    const icons={good:'✅',partial:'⚠️',poor:'❌'};
    const labels={good:'Gut gemacht!',partial:'Fast richtig!',poor:'Überarbeiten'};
    const colors={good:'good',partial:'partial',poor:'poor'};

    fb.className=`ai-feedback ${colors[parsed.rating]} visible`;
    fb.innerHTML=`<div class="fb-header">${icons[parsed.rating]} ${labels[parsed.rating]} (${parsed.points}/${ex.pts} Pkt.)</div>
      <div>${parsed.feedback}</div>
      ${parsed.missing?`<div style="margin-top:6px;color:#777">💡 ${parsed.missing}</div>`:''}
      <div class="model-answer"><strong>Musterlösung:</strong> ${ex.modelAnswer}</div>`;

    if(!AI_RESULTS[`${sid}-${eid}`]){
      AI_RESULTS[`${sid}-${eid}`]={done:true,rating:parsed.rating};
      if(!SCORES[sid]) SCORES[sid]={points:0,max:0};
      SCORES[sid].max+=ex.pts;
      SCORES[sid].points+=parsed.points||0;
    }

    btn.textContent='✓ Bewertet';
    ta.readOnly=true;
  } catch(e){
    fb.className='ai-feedback poor visible';
    fb.innerHTML=`<div class="fb-header">❌ Verbindungsfehler</div>Bewertung nicht möglich. <div class="model-answer"><strong>Musterlösung:</strong> ${ex.modelAnswer}</div>`;
    btn.textContent='Erneut versuchen';
    btn.disabled=false;
  }
}

// ── STATUS ─────────────────────────────────────
function setStatus(id,st,event){
  STATUS[id]=st;
  updateProgress();
  document.querySelectorAll('.assess-btn').forEach(b=>b.classList.remove('sel-s','sel-u'));
  if(event&&event.target) event.target.classList.add(st==='sicher'?'sel-s':'sel-u');
  const nav=document.getElementById('nav-'+id);
  if(nav){
    nav.className='nav-btn active';
    if(st==='sicher') nav.classList.add('done');
    else nav.classList.add('warn');
  }
  renderSection(SECTIONS[id]);
}

function updateProgress(){
  const done=Object.keys(STATUS).filter(k=>STATUS[k]==='sicher').length;
  const total=SECTIONS.length;
  const pct=Math.round(done/total*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${done} von ${total} Lernzielen als "Sicher" markiert`;
  SECTIONS.forEach(s=>{
    const nb=document.getElementById('nav-'+s.id);
    if(!nb) return;
    const wasActive=nb.classList.contains('active');
    nb.className='nav-btn'+(wasActive?' active':'');
    if(STATUS[s.id]==='sicher') nb.classList.add('done');
    else if(STATUS[s.id]==='unsicher') nb.classList.add('warn');
  });
}

// ── FINAL EVALUATION ───────────────────────────
function renderEval(){
  const sicher=SECTIONS.filter(s=>STATUS[s.id]==='sicher').length;
  const unsicher=SECTIONS.filter(s=>STATUS[s.id]==='unsicher').length;
  const total=SECTIONS.length;
  const pct=Math.round(sicher/total*100);

  let totalPts=0,maxPts=0;
  SECTIONS.forEach(s=>{
    if(SCORES[s.id]){totalPts+=SCORES[s.id].points;maxPts+=SCORES[s.id].max;}
  });

  const cat=pct>=80?'great':pct>=50?'good':'needs-work';
  const emoji=pct>=80?'🎉':pct>=50?'👍':'💪';
  const msg=pct>=80?'Sehr gut vorbereitet!':pct>=50?'Gut auf dem Weg!':'Noch Übungsbedarf';
  const sub=pct>=80?'Du bist bereit für die Überprüfung.':pct>=50?'Arbeite noch an den unsicheren Themen.':'Schau dir die roten Bereiche nochmal an.';

  let topicsHtml='';
  SECTIONS.forEach(s=>{
    const st=STATUS[s.id];
    const sc=SCORES[s.id];
    const icon=st==='sicher'?'✅':st==='unsicher'?'⚠️':'⭕';
    const tbClass=st==='sicher'?'gut':st==='unsicher'?'mittel':'schwach';
    const tbLabel=st==='sicher'?'Sicher':st==='unsicher'?'Üben!':'Nicht bearbeitet';
    const scText=sc?` · ${sc.points}/${sc.max} Pkt.`:'';
    topicsHtml+=`<div class="topic-result">
      <div class="tr-icon">${icon}</div>
      <div class="tr-info"><div class="tr-title">${s.title}</div><div class="tr-score">${s.desc}${scText}</div></div>
      <div class="tr-badge ${tbClass}">${tbLabel}</div>
    </div>`;
  });

  const scoreText=maxPts>0?`<div style="font-size:13px;color:#555;margin-top:4px">${totalPts} von ${maxPts} bewerteten Punkten</div>`:'';

  const html=`
  <button class="back-btn" onclick="showSection('overview')">‹ Zurück zur Übersicht</button>
  <div class="card">
    <div class="eval-wrap">
      <div class="eval-header ${cat}">
        <div class="eval-score">${emoji} ${pct}%</div>
        <div class="eval-msg">${msg}</div>
        <div class="eval-sub">${sub}</div>
        ${scoreText}
      </div>
      <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase">Thema für Thema</div>
      <div class="topic-results">${topicsHtml}</div>
      ${unsicher>0?`<div class="hint-box" style="margin-top:12px">⚠️ <strong>Fokus für die Überprüfung:</strong> Geh die ${unsicher} unsicheren Themen nochmal durch – besonders die Aufgaben vom Typ AFB II und III!</div>`:''}
      <button class="restart-btn" onclick="showSection('overview')">🔄 Zurück – nochmal üben</button>
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML=html;
}

// ── NAVIGATION ─────────────────────────────────
function showSection(id){
  currentSection=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(id==='overview'){
    document.querySelector('.nav-btn:first-child').classList.add('active');
    renderOverview();
  } else if(id==='eval'){
    renderEval();
  } else {
    const nb=document.getElementById('nav-'+id);
    if(nb) nb.classList.add('active');
    renderSection(SECTIONS[id]);
  }
}

renderOverview();
